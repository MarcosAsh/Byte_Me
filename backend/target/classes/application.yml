spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rescuebites}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:replace-this-with-a-secure-random-string-at-least-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${PORT:8080}
